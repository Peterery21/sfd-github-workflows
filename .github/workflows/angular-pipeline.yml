name: Angular Pipeline

on:
  workflow_call:
    inputs:
      app-name:
        description: "Nom de l'application (ex: sfd-angular)"
        type: string
        required: true
      dev-port:
        description: "Port exposé en environnement dev"
        type: number
        required: true
      prod-port:
        description: "Port exposé en environnement prod"
        type: number
        required: true
      release-branch:
        description: "Branche de production"
        type: string
        default: "master"
      e2e-enabled:
        description: "Activer les tests E2E Playwright post-deploy"
        type: boolean
        default: false
      e2e-command:
        description: "Commande E2E Playwright"
        type: string
        default: "npm run e2e:chromium"
      e2e-base-url:
        description: "URL de base pour les tests E2E"
        type: string
        default: ""
      json-server-port:
        description: "Port JSON Server (0 = désactivé)"
        type: number
        default: 0
      internal-port:
        description: "Port interne du container (80 pour Nginx SPA, 4000 pour SSR Node)"
        type: number
        default: 80
      backend-health-checks:
        description: |
          Backends à vérifier avant E2E (un par ligne, format "name:port").
          Le health check s'effectue via SSH sur le VPS : curl http://localhost:{port}/api/{name}/actuator/health
          Exemple:
            sfd-commun:4597
            sfd-client:4598
            sfd-caisse:4599
        type: string
        default: ""
    secrets:
      REGISTRY_URL:
        required: false
      REGISTRY_USER:
        required: false
      REGISTRY_PASSWORD:
        required: false
      VPS_HOST:
        required: false
      VPS_USER:
        required: false
      VPS_SSH_KEY:
        required: false

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Build Angular + Docker Push
  # ─────────────────────────────────────────
  build:
    name: Build Angular
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      container-name: ${{ steps.tag.outputs.container-name }}
      port-mapping: ${{ steps.tag.outputs.port-mapping }}
      app-env: ${{ steps.version.outputs.app-env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package.json"

      - name: Cache Angular build
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            angular-${{ runner.os }}-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Set version and environment
        id: version
        run: |
          RUN_NUM=${{ github.run_number }}
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "${{ inputs.release-branch }}" ]; then
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "ng-config=production" >> $GITHUB_OUTPUT
            echo "app-env=prod" >> $GITHUB_OUTPUT
          else
            echo "version=${RUN_NUM}-SNAPSHOT" >> $GITHUB_OUTPUT
            echo "ng-config=development" >> $GITHUB_OUTPUT
            echo "app-env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build Angular
        run: npx ng build --configuration ${{ steps.version.outputs.ng-config }}
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Set image tags
        id: tag
        run: |
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "${{ inputs.release-branch }}" ]; then
            IMAGE="${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:latest"
            CONTAINER="${{ inputs.app-name }}"
            PORT="${{ inputs.prod-port }}:${{ inputs.internal-port }}"
          else
            IMAGE="${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}-dev:${{ steps.version.outputs.version }}"
            CONTAINER="${{ inputs.app-name }}-dev"
            PORT="${{ inputs.dev-port }}:${{ inputs.internal-port }}"
          fi
          echo "image-tag=${IMAGE}" >> $GITHUB_OUTPUT
          echo "container-name=${CONTAINER}" >> $GITHUB_OUTPUT
          echo "port-mapping=${PORT}" >> $GITHUB_OUTPUT

      - name: Login to Docker Registry
        if: github.ref_name == inputs.release-branch
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} \
            -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build & Push Docker image
        if: github.ref_name == inputs.release-branch
        # --build-arg APP_ENV comme Jenkins: NodeUtils.buildAngular → DockerUtils.buildImage(buildArgs: "--build-arg APP_ENV=${envName}")
        run: |
          docker build \
            --build-arg APP_ENV=${{ steps.version.outputs.app-env }} \
            -t ${{ steps.tag.outputs.image-tag }} .
          docker push ${{ steps.tag.outputs.image-tag }}

  # ─────────────────────────────────────────
  # JOB 2 : Deploy via SSH + Health Check + Rollback
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref_name == inputs.release-branch

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy container via SSH
        env:
          APP_ENV: ${{ needs.build.outputs.app-env }}
          CONTAINER: ${{ needs.build.outputs.container-name }}
          PORT: ${{ needs.build.outputs.port-mapping }}
          APP_NAME: ${{ inputs.app-name }}
          JSON_SERVER_PORT: ${{ inputs.json-server-port }}
          RELEASE_BRANCH: ${{ inputs.release-branch }}
        run: |
          # Reconstruct full image URL (avoids GitHub secret masking in outputs)
          if [ "$APP_ENV" = "prod" ]; then
            IMAGE="${{ secrets.REGISTRY_URL }}/${APP_NAME}:latest"
          else
            IMAGE="${{ secrets.REGISTRY_URL }}/${APP_NAME}-dev:${{ needs.build.outputs.version }}"
          fi

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            APP_ENV="$APP_ENV" \
            CONTAINER="$CONTAINER" \
            PORT="$PORT" \
            APP_NAME="$APP_NAME" \
            JSON_SERVER_PORT="$JSON_SERVER_PORT" \
            RELEASE_BRANCH="$RELEASE_BRANCH" \
            IMAGE="$IMAGE" \
            bash << 'ENDSSH'
            set -e

            echo "🚀 Deploying ${CONTAINER} (${IMAGE})..."

            # Pull la nouvelle image
            docker pull "${IMAGE}"

            # Sauvegarder l'ancienne image AVANT arrêt (comme Jenkins: DockerUtils.currentImage)
            OLD_IMAGE=$(docker inspect "${CONTAINER}" --format='{{.Config.Image}}' 2>/dev/null || echo "")

            # Construire les args JSON server
            EXTRA_ARGS=""
            if [ "${JSON_SERVER_PORT}" != "0" ]; then
              if [ "${APP_ENV}" = "prod" ]; then
                EXTRA_ARGS="-p 3588:3000"
              else
                EXTRA_ARGS="-p 3589:3000"
              fi
            fi

            # Réseau Docker (identique au blueprint Jenkins: "${envName}-network")
            NETWORK="${APP_ENV}-network"
            docker network create "${NETWORK}" 2>/dev/null || true

            # Sauvegarder tous les paramètres pour le rollback
            {
              echo "OLD_IMAGE=${OLD_IMAGE}"
              echo "PORT=${PORT}"
              echo "APP_ENV=${APP_ENV}"
              echo "EXTRA_ARGS=${EXTRA_ARGS}"
              echo "NETWORK=${NETWORK}"
            } > /tmp/rollback_${CONTAINER}.env

            # Arrêter et supprimer l'ancien container
            docker stop "${CONTAINER}" 2>/dev/null || true
            docker rm "${CONTAINER}" 2>/dev/null || true

            # Démarrer le nouveau container avec le réseau Docker (nginx résout les backends par hostname)
            docker run -d \
              --name "${CONTAINER}" \
              --restart=always \
              --network "${NETWORK}" \
              -p "${PORT}" \
              -e NODE_ENV="${APP_ENV}" \
              ${EXTRA_ARGS} \
              "${IMAGE}"

            echo "✅ Container ${CONTAINER} started on network ${NETWORK}"
          ENDSSH

      - name: Health check
        # Exécuté via SSH (curl localhost depuis le VPS) car le runner GitHub Actions
        # est une IP externe — les ports internes du VPS ne sont pas exposés publiquement.
        env:
          PORT_MAPPING: ${{ needs.build.outputs.port-mapping }}
          CONTAINER: ${{ needs.build.outputs.container-name }}
        run: |
          PORT=$(echo "$PORT_MAPPING" | cut -d: -f1)
          echo "Checking http://localhost:${PORT} on VPS (via SSH)..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            PORT="$PORT" CONTAINER="$CONTAINER" \
            bash << 'HEALTHCHECK'
            sleep 5

            # Vérifier que le conteneur est encore en vie
            RUNNING=$(docker inspect --format='{{.State.Running}}' "${CONTAINER}" 2>/dev/null || echo "false")
            echo "Container ${CONTAINER} running: ${RUNNING}"
            if [ "${RUNNING}" != "true" ]; then
              echo "❌ Container exited immediately — logs:"
              docker logs --tail 30 "${CONTAINER}" 2>&1 || true
              echo "--- docker ps ---"
              docker ps -a --filter "name=${CONTAINER}"
            fi

            for i in $(seq 1 15); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://localhost:${PORT}" 2>/dev/null)
              if [ "$STATUS" = "200" ]; then
                echo "✅ Health check passed (attempt $i)"
                exit 0
              fi
              # Re-check container state
              RUNNING=$(docker inspect --format='{{.State.Running}}' "${CONTAINER}" 2>/dev/null || echo "false")
              echo "Attempt $i/15 — HTTP ${STATUS}, container running: ${RUNNING}"
              if [ "${RUNNING}" != "true" ]; then
                echo "Container logs:"
                docker logs --tail 20 "${CONTAINER}" 2>&1 || true
              fi
              sleep 10
            done

            echo "❌ Health check failed — rolling back"
            set -a; source /tmp/rollback_${CONTAINER}.env 2>/dev/null; set +a
            if [ -z "$OLD_IMAGE" ]; then
              echo "No previous image — cannot roll back"
              exit 1
            fi
            echo "↩️ Rolling back to ${OLD_IMAGE}"
            docker stop "${CONTAINER}" 2>/dev/null || true
            docker rm "${CONTAINER}" 2>/dev/null || true
            docker run -d \
              --name "${CONTAINER}" \
              --restart=always \
              --network "${NETWORK}" \
              -p "${PORT}" \
              -e NODE_ENV="${APP_ENV}" \
              ${EXTRA_ARGS} \
              "${OLD_IMAGE}"
            echo "✅ Rollback successful"
            exit 1
          HEALTHCHECK

  # ─────────────────────────────────────────
  # JOB 3 : E2E Tests (optionnel, après deploy)
  # ─────────────────────────────────────────
  e2e:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, deploy]
    # always() force l'évaluation même si deploy est skippé (develop). Ensuite on vérifie les conditions manuellement.
    if: always() && inputs.e2e-enabled == true && needs.build.result == 'success' && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Wait for backends health
        # Gate E2E : vérifie que tous les backends sont UP avant de lancer les tests.
        # Retry × 5 avec backoff 30s (max ~2.5min par backend).
        if: ${{ inputs.backend-health-checks != '' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            bash -s << 'HEALTHGATE'
          MAX_ATTEMPTS=5
          WAIT_SECONDS=30
          CHECKS='${{ inputs.backend-health-checks }}'
          ALL_OK=true

          while IFS= read -r entry; do
            [ -z "$entry" ] && continue
            NAME=$(echo "$entry" | cut -d: -f1 | xargs)
            PORT=$(echo "$entry" | cut -d: -f2 | xargs)
            echo "⏳ Checking $NAME on port $PORT..."
            ok=false
            for i in $(seq 1 $MAX_ATTEMPTS); do
              if curl -sf --max-time 5 "http://localhost:${PORT}/api/${NAME}/actuator/health" > /dev/null 2>&1; then
                echo "  ✅ $NAME UP"
                ok=true
                break
              fi
              echo "  ⏳ attempt $i/$MAX_ATTEMPTS — waiting ${WAIT_SECONDS}s..."
              sleep $WAIT_SECONDS
            done
            if [ "$ok" = "false" ]; then
              echo "  ❌ $NAME FAILED after $MAX_ATTEMPTS attempts on port $PORT"
              ALL_OK=false
            fi
          done <<< "$CHECKS"

          if [ "$ALL_OK" = "false" ]; then
            echo "❌ One or more backends are not healthy — aborting E2E"
            exit 1
          fi
          echo "✅ All backends healthy — proceeding with E2E"
          HEALTHGATE

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package.json"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers + system deps
        # Comme Jenkins: npx playwright install chromium + install-deps chromium
        run: npx playwright install chromium --with-deps

      - name: Open SSH tunnel to VPS
        # Port 4630 peut être bloqué par le firewall VPS pour les IPs externes.
        # On ouvre un tunnel SSH pour que les tests Playwright atteignent l'app via localhost.
        run: |
          PORT=$(echo "${{ needs.build.outputs.port-mapping }}" | cut -d: -f1)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -L ${PORT}:localhost:${PORT} \
            -N -f \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          echo "SSH tunnel opened on localhost:${PORT}"

      - name: Determine E2E base URL
        id: e2e-url
        run: |
          PORT=$(echo "${{ needs.build.outputs.port-mapping }}" | cut -d: -f1)
          if [ -n "${{ inputs.e2e-base-url }}" ]; then
            echo "url=${{ inputs.e2e-base-url }}" >> $GITHUB_OUTPUT
          else
            echo "url=http://localhost:${PORT}" >> $GITHUB_OUTPUT
          fi

      - name: Create .auth directory
        run: mkdir -p .auth

      - name: Run E2E tests
        run: ${{ inputs.e2e-command }}
        env:
          CI: true
          BASE_URL: ${{ steps.e2e-url.outputs.url }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload Playwright report
        # Comme Jenkins: archiveArtifacts playwright-report/** (toujours, même en échec)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

      - name: Upload E2E results (JUnit)
        # Comme Jenkins: archiveArtifacts e2e-results/** + junit testResults: 'e2e-results/junit.xml'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ github.run_number }}
          path: e2e-results/
          retention-days: 7
