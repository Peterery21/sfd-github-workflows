name: Deploy Missing Artifacts to Nexus

on:
  workflow_dispatch: {}

jobs:
  deploy:
    name: Upload JARs from VPS Maven cache to Nexus
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy artifacts from Jenkins Maven cache to Nexus
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} /bin/bash << 'ENDSSH'
            set -e
            NEXUS="https://nexus.evolticatechnologies.com"
            AUTH="admin:motdepasse"

            # Find Jenkins container
            JC=$(docker ps --format '{{.Names}}' | grep -i jenkins | head -1)
            echo "Jenkins container: $JC"
            if [ -z "$JC" ]; then
              echo "ERROR: No Jenkins container found"
              docker ps
              exit 1
            fi

            # Function to upload a JAR+POM pair
            upload_artifact() {
              local FULL_PATH="$1"
              local RELATIVE="${FULL_PATH#/root/.m2/repository/}"
              local FILENAME=$(basename "$FULL_PATH")
              local VER_DIR=$(dirname "$FULL_PATH")
              local VERSION=$(basename "$VER_DIR")
              local ART_DIR=$(dirname "$VER_DIR")
              local ARTIFACT_ID=$(basename "$ART_DIR")
              local GROUP_DIR=$(dirname "$ART_DIR")
              local RELATIVE_GROUP="${GROUP_DIR#/root/.m2/repository/}"

              # Skip if not a SNAPSHOT
              echo "$VERSION" | grep -q "SNAPSHOT" || return 0

              echo "==> $ARTIFACT_ID:$VERSION"
              local POM="${VER_DIR}/${ARTIFACT_ID}-${VERSION}.pom"

              # Copy JAR from container
              docker cp "$JC:$FULL_PATH" /tmp/upload.jar 2>/dev/null || return 1

              # Upload JAR
              HTTP=$(curl -s -k -o /dev/null -w "%{http_code}" \
                -u "$AUTH" -X PUT \
                --upload-file /tmp/upload.jar \
                "$NEXUS/repository/maven-snapshots/${RELATIVE_GROUP}/${ARTIFACT_ID}/${VERSION}/${FILENAME}")
              echo "    JAR: HTTP $HTTP"

              # Upload POM if exists
              if docker exec "$JC" test -f "$POM" 2>/dev/null; then
                docker cp "$JC:$POM" /tmp/upload.pom 2>/dev/null
                HTTP=$(curl -s -k -o /dev/null -w "%{http_code}" \
                  -u "$AUTH" -X PUT \
                  --upload-file /tmp/upload.pom \
                  "$NEXUS/repository/maven-snapshots/${RELATIVE_GROUP}/${ARTIFACT_ID}/${VERSION}/${ARTIFACT_ID}-${VERSION}.pom")
                echo "    POM: HTTP $HTTP"
              fi
            }

            # Process all internal artifact JARs
            for JAR in $(docker exec "$JC" find \
              /root/.m2/repository/com/kodzotech \
              /root/.m2/repository/com/evoltica \
              /root/.m2/repository/com/synapsesit 2>/dev/null \
              -name "*.jar" | grep -v sources | grep -v javadoc | grep -v tests | grep -v test-); do
              upload_artifact "$JAR" || echo "WARN: failed $JAR"
            done

            echo "Done!"
          ENDSSH
