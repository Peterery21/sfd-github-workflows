name: Deploy Missing Artifacts to Nexus

on:
  workflow_dispatch: {}

jobs:
  find-and-deploy:
    name: Find JARs in Jenkins workspaces and deploy to Nexus
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Find and upload specific missing SNAPSHOT versions
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} /bin/bash << 'ENDSSH'
            NEXUS="https://nexus.evolticatechnologies.com"
            AUTH="admin:motdepasse"

            echo "=== Searching all JAR files for needed versions ==="
            # Search in Jenkins workspace and Maven repos
            find /var/lib/jenkins /home/ubuntu /root -name "*.jar" 2>/dev/null | \
              grep -E "security-oauth2|notification-api|fileupload-api|planificateur-api|number-generator|activity-tracking|sfd-demo-data|sfd-report-api|sfd-integration-api" | \
              grep -v sources | grep -v javadoc | grep -v tests | head -100

            echo "=== Jenkins workspaces ==="
            ls /var/lib/jenkins/workspace/ 2>/dev/null | head -30

            echo "=== Specific version search ==="
            find /var/lib/jenkins -name "security-oauth2*.jar" 2>/dev/null | head -20
            find /var/lib/jenkins -name "notification-api*.jar" 2>/dev/null | head -20
          ENDSSH
