name: Nexus Upload

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (list files without uploading)'
        type: boolean
        default: false

jobs:
  upload:
    name: Upload JARs from Jenkins archives to Nexus
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload missing SNAPSHOT JARs to Nexus via mvn deploy:deploy-file
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} /bin/bash << 'ENDSSH'
            NEXUS="https://nexus.evolticatechnologies.com"
            NEXUS_USER="admin"
            NEXUS_PASS="motdepasse"
            JENKINS="/var/lib/jenkins"

            # Use mvn deploy:deploy-file to properly handle SNAPSHOT metadata
            MVN=$(which mvn 2>/dev/null || ls /var/lib/jenkins/tools/hudson.tasks.Maven_MavenInstallation/*/bin/mvn 2>/dev/null | head -1)
            echo "Maven: $MVN"

            deploy_artifact() {
              local JAR_FILE="$1"
              local GROUP_ID="$2"
              local ARTIFACT_ID="$3"
              local VERSION="$4"

              echo "==> $ARTIFACT_ID:$VERSION ($JAR_FILE)"
              "$MVN" deploy:deploy-file \
                -Durl="$NEXUS/repository/maven-snapshots/" \
                -DrepositoryId=nexus-snapshots \
                -Dfile="$JAR_FILE" \
                -DgroupId="$GROUP_ID" \
                -DartifactId="$ARTIFACT_ID" \
                -Dversion="$VERSION" \
                -Dpackaging=jar \
                -DgeneratePom=true \
                -s /var/lib/jenkins/.m2/settings.xml \
                -q 2>&1 | tail -5 && echo "    OK" || echo "    FAILED"
            }

            # Write settings.xml with Nexus credentials
            mkdir -p /tmp/nexus-deploy
            printf '%s\n' \
              '<settings>' \
              '  <servers>' \
              "    <server><id>nexus-snapshots</id><username>${NEXUS_USER}</username><password>${NEXUS_PASS}</password></server>" \
              '  </servers>' \
              '</settings>' > /tmp/nexus-settings.xml

            find_jar() {
              find "$JENKINS/jobs" -name "${1}-${2}.jar" 2>/dev/null | grep -v sources | grep -v javadoc | tail -1
            }

            echo "=== com.kodzotech ==="
            JAR=$(find_jar "security-oauth2" "3.7.0-SNAPSHOT")
            [ -n "$JAR" ] && "$MVN" deploy:deploy-file \
              -Durl="$NEXUS/repository/maven-snapshots/" \
              -DrepositoryId=nexus-snapshots \
              -Dfile="$JAR" -DgroupId="com.kodzotech" -DartifactId="security-oauth2" -Dversion="3.7.0-SNAPSHOT" \
              -Dpackaging=jar -DgeneratePom=true -s /tmp/nexus-settings.xml -q && echo "security-oauth2 OK" || echo "security-oauth2 FAILED"

            JAR=$(find_jar "notification-api" "2.11.0-SNAPSHOT")
            [ -n "$JAR" ] && "$MVN" deploy:deploy-file \
              -Durl="$NEXUS/repository/maven-snapshots/" \
              -DrepositoryId=nexus-snapshots \
              -Dfile="$JAR" -DgroupId="com.kodzotech" -DartifactId="notification-api" -Dversion="2.11.0-SNAPSHOT" \
              -Dpackaging=jar -DgeneratePom=true -s /tmp/nexus-settings.xml -q && echo "notification-api OK" || echo "notification-api FAILED"

            JAR=$(find_jar "planificateur-api" "0.0.3-SNAPSHOT")
            [ -n "$JAR" ] && "$MVN" deploy:deploy-file \
              -Durl="$NEXUS/repository/maven-snapshots/" \
              -DrepositoryId=nexus-snapshots \
              -Dfile="$JAR" -DgroupId="com.kodzotech" -DartifactId="planificateur-api" -Dversion="0.0.3-SNAPSHOT" \
              -Dpackaging=jar -DgeneratePom=true -s /tmp/nexus-settings.xml -q && echo "planificateur-api OK" || echo "planificateur-api FAILED"

            JAR=$(find_jar "number-generator-api" "0.0.1-SNAPSHOT")
            [ -n "$JAR" ] && "$MVN" deploy:deploy-file \
              -Durl="$NEXUS/repository/maven-snapshots/" \
              -DrepositoryId=nexus-snapshots \
              -Dfile="$JAR" -DgroupId="com.kodzotech" -DartifactId="number-generator-api" -Dversion="0.0.1-SNAPSHOT" \
              -Dpackaging=jar -DgeneratePom=true -s /tmp/nexus-settings.xml -q && echo "number-generator-api OK" || echo "number-generator-api FAILED"

            echo "=== com.evoltica ==="
            JAR=$(find "$JENKINS" -name "activity-tracking-starter-1.0.0-SNAPSHOT.jar" 2>/dev/null | grep -v sources | tail -1)
            [ -n "$JAR" ] && "$MVN" deploy:deploy-file \
              -Durl="$NEXUS/repository/maven-snapshots/" \
              -DrepositoryId=nexus-snapshots \
              -Dfile="$JAR" -DgroupId="com.evoltica" -DartifactId="activity-tracking-starter" -Dversion="1.0.0-SNAPSHOT" \
              -Dpackaging=jar -DgeneratePom=true -s /tmp/nexus-settings.xml -q && echo "activity-tracking-starter OK" || echo "activity-tracking-starter FAILED"

            echo "=== com.synapsesit ==="
            for ARTIFACT in "sfd-demo-data" "sfd-report-api" "sfd-integration-api"; do
              JAR=$(find "$JENKINS" -name "${ARTIFACT}-1.0.0-SNAPSHOT.jar" 2>/dev/null | grep -v sources | tail -1)
              [ -n "$JAR" ] && "$MVN" deploy:deploy-file \
                -Durl="$NEXUS/repository/maven-snapshots/" \
                -DrepositoryId=nexus-snapshots \
                -Dfile="$JAR" -DgroupId="com.synapsesit" -DartifactId="$ARTIFACT" -Dversion="1.0.0-SNAPSHOT" \
                -Dpackaging=jar -DgeneratePom=true -s /tmp/nexus-settings.xml -q && echo "$ARTIFACT OK" || echo "$ARTIFACT FAILED"
            done

            echo "=== Done ==="
          ENDSSH
