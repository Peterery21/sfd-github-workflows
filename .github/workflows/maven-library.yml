name: Maven Library Pipeline

on:
  workflow_call:
    inputs:
      app-name:
        description: "Nom de la librairie"
        type: string
        required: true
      java-version:
        description: "Version Java (ex: 17, 21)"
        type: string
        default: "21"
      maven-goals:
        description: "Goals Maven"
        type: string
        default: "clean verify"
      sonar-enabled:
        description: "Activer l'analyse SonarQube"
        type: boolean
        default: true
      nexus-deploy:
        description: "Déployer sur Nexus"
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      NEXUS_URL:
        required: false
      NEXUS_USER:
        required: false
      NEXUS_PASSWORD:
        required: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: "temurin"
          cache: "maven"

      - name: Configure Maven settings (Nexus)
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          {
            echo '<settings>'
            echo '  <servers>'
            if [ -n "$NEXUS_URL" ]; then
              echo "    <server><id>nexus</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server>"
              echo "    <server><id>nexus-snapshots</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server>"
              echo "    <server><id>nexus-releases</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server>"
            fi
            echo '  </servers>'
            if [ -n "$NEXUS_URL" ]; then
              echo '  <profiles>'
              echo '    <profile>'
              echo '      <id>nexus-private</id>'
              echo '      <repositories>'
              echo '        <repository>'
              echo '          <id>nexus-releases</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-releases/</url>"
              echo '          <releases><enabled>true</enabled></releases>'
              echo '          <snapshots><enabled>false</enabled></snapshots>'
              echo '        </repository>'
              echo '        <repository>'
              echo '          <id>nexus-snapshots</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-snapshots/</url>"
              echo '          <releases><enabled>false</enabled></releases>'
              echo '          <snapshots><enabled>true</enabled><updatePolicy>always</updatePolicy></snapshots>'
              echo '        </repository>'
              echo '      </repositories>'
              echo '      <pluginRepositories>'
              echo '        <pluginRepository>'
              echo '          <id>nexus-releases</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-releases/</url>"
              echo '          <releases><enabled>true</enabled></releases>'
              echo '          <snapshots><enabled>false</enabled></snapshots>'
              echo '        </pluginRepository>'
              echo '        <pluginRepository>'
              echo '          <id>nexus-snapshots</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-snapshots/</url>"
              echo '          <releases><enabled>false</enabled></releases>'
              echo '          <snapshots><enabled>true</enabled><updatePolicy>always</updatePolicy></snapshots>'
              echo '        </pluginRepository>'
              echo '      </pluginRepositories>'
              echo '    </profile>'
              echo '  </profiles>'
              echo '  <activeProfiles>'
              echo '    <activeProfile>nexus-private</activeProfile>'
              echo '  </activeProfiles>'
            fi
            echo '</settings>'
          } > ~/.m2/settings.xml
          echo "settings.xml written"

      - name: Build & Test
        run: mvn ${{ inputs.maven-goals }} -q -U

      - name: SonarQube Analysis
        if: ${{ inputs.sonar-enabled }}
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            -Dsonar.java.source=${{ inputs.java-version }} \
            -Dsonar.java.target=${{ inputs.java-version }} \
            "-Dsonar.exclusions=**/generated-sources/**,**/generated/**,**/target/generated-sources/**,**/*MapperImpl.java,**/*MapperImpl.class" \
            "-Dsonar.coverage.exclusions=**/*Application.java,**/*Config.java,**/*Configuration.java,**/*Dto.java,**/dto/**,**/*Entity.java,**/entity/**,**/exception/**,**/*Exception.java,**/*Mapper.java,**/mapper/**,**/enums/**,**/loader/**,**/config/**,**/*RestClient.java,**/events/**" \
            "-Dsonar.cpd.exclusions=**/*Dto.java,**/dto/**,**/*Entity.java,**/entity/**,**/enums/**"

      - name: Deploy to Nexus
        if: ${{ inputs.nexus-deploy && (github.ref_name == 'develop' || github.ref_name == 'master' || github.ref_name == 'main') }}
        run: |
          mvn deploy -DskipTests -q
        continue-on-error: false
