name: Maven Library Pipeline

on:
  workflow_call:
    inputs:
      app-name:
        description: "Nom de la librairie"
        type: string
        required: true
      maven-goals:
        description: "Goals Maven"
        type: string
        default: "clean verify"
      sonar-enabled:
        description: "Activer l'analyse SonarQube"
        type: boolean
        default: true
      nexus-deploy:
        description: "Déployer sur Nexus"
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      NEXUS_URL:
        required: false
      NEXUS_USER:
        required: false
      NEXUS_PASSWORD:
        required: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Configure Maven settings (Nexus)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <mirrors>
              <mirror>
                <id>nexus-public</id>
                <mirrorOf>*</mirrorOf>
                <url>${{ secrets.NEXUS_URL }}/repository/maven-public/</url>
              </mirror>
            </mirrors>
            <servers>
              <server>
                <id>nexus-public</id>
                <username>${{ secrets.NEXUS_USER }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>nexus-snapshots</id>
                <username>${{ secrets.NEXUS_USER }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>nexus-releases</id>
                <username>${{ secrets.NEXUS_USER }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build & Test
        run: mvn ${{ inputs.maven-goals }} -q

      - name: SonarQube Analysis
        if: ${{ inputs.sonar-enabled }}
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -q

      - name: Deploy to Nexus
        if: ${{ inputs.nexus-deploy && github.ref_name == 'develop' || github.ref_name == 'master' || github.ref_name == 'main' }}
        run: |
          mvn deploy -DskipTests -q \
            -Drepository.url=${{ secrets.NEXUS_URL }} \
            -Drepository.username=${{ secrets.NEXUS_USER }} \
            -Drepository.password=${{ secrets.NEXUS_PASSWORD }}
        continue-on-error: true
