name: Maven Library Pipeline

on:
  workflow_call:
    inputs:
      app-name:
        description: "Nom de la librairie"
        type: string
        required: true
      maven-goals:
        description: "Goals Maven"
        type: string
        default: "clean verify"
      sonar-enabled:
        description: "Activer l'analyse SonarQube"
        type: boolean
        default: true
      nexus-deploy:
        description: "Déployer sur Nexus"
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      NEXUS_URL:
        required: false
      NEXUS_USER:
        required: false
      NEXUS_PASSWORD:
        required: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Configure Maven mirror (Nexus)
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          python3 -c "
import os
url = os.environ.get('NEXUS_URL', '')
user = os.environ.get('NEXUS_USER', '')
pwd = os.environ.get('NEXUS_PASSWORD', '')
xml = '''<settings>
  <mirrors>
    <mirror>
      <id>nexus-public</id>
      <mirrorOf>*</mirrorOf>
      <url>{url}/repository/maven-public/</url>
    </mirror>
  </mirrors>
  <servers>
    <server><id>nexus-public</id><username>{user}</username><password>{pwd}</password></server>
    <server><id>nexus-snapshots</id><username>{user}</username><password>{pwd}</password></server>
    <server><id>nexus-releases</id><username>{user}</username><password>{pwd}</password></server>
  </servers>
</settings>'''.format(url=url, user=user, pwd=pwd)
import os; os.makedirs(os.path.expanduser('~/.m2'), exist_ok=True)
open(os.path.expanduser('~/.m2/settings.xml'), 'w').write(xml)
print('settings.xml written')
"

      - name: Build & Test
        run: mvn ${{ inputs.maven-goals }} -q -U

      - name: SonarQube Analysis
        if: ${{ inputs.sonar-enabled }}
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -q

      - name: Deploy to Nexus
        if: ${{ inputs.nexus-deploy && github.ref_name == 'develop' || github.ref_name == 'master' || github.ref_name == 'main' }}
        run: |
          mvn deploy -DskipTests -q \
            -Drepository.url=${{ secrets.NEXUS_URL }} \
            -Drepository.username=${{ secrets.NEXUS_USER }} \
            -Drepository.password=${{ secrets.NEXUS_PASSWORD }}
        continue-on-error: true
