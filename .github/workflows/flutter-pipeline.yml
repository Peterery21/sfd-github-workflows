name: Flutter CI Pipeline
on:
  workflow_call:
    inputs:
      app-name:
        description: "Nom de l'application Flutter"
        type: string
        required: true
      flutter-version:
        description: "Version de Flutter"
        type: string
        default: "3.41.4"
      shared-package-repo:
        description: "Repo GitHub du package partagé (ex: Peterery21/sfd_shared). Si vide, pas de package partagé."
        type: string
        default: ""
      shared-package-path:
        description: "Nom du dossier où cloner le package partagé (relatif au workspace)"
        type: string
        default: "sfd_shared"
      run-tests:
        description: "Exécuter les tests"
        type: boolean
        default: true
    secrets:
      GH_PAT:
        required: false

jobs:
  build:
    name: Build & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout shared package
        if: ${{ inputs.shared-package-repo != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.shared-package-repo }}
          path: ${{ inputs.shared-package-path }}
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          cache: true

      - name: Override shared package path
        if: ${{ inputs.shared-package-repo != '' }}
        run: |
          PKG_NAME=$(basename "${{ inputs.shared-package-path }}")
          echo "dependency_overrides:" > pubspec_overrides.yaml
          echo "  $PKG_NAME:" >> pubspec_overrides.yaml
          echo "    path: ${{ inputs.shared-package-path }}" >> pubspec_overrides.yaml
          cat pubspec_overrides.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        if: ${{ inputs.run-tests }}
        run: flutter test
