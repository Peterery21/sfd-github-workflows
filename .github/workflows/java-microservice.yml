name: Java Microservice Pipeline

on:
  workflow_call:
    inputs:
      app-name:
        description: "Nom de l'application (ex: sfd-epargne)"
        type: string
        required: true
      dev-port:
        description: "Port exposé en environnement dev"
        type: number
        required: true
      prod-port:
        description: "Port exposé en environnement prod"
        type: number
        required: true
      java-internal-port:
        description: "Port interne de l'application Spring Boot"
        type: number
        required: true
      health-path:
        description: "Chemin du health check (ex: /api/epargne/actuator/health)"
        type: string
        required: true
      release-branch:
        description: "Branche de production (master ou main)"
        type: string
        default: "master"
      jvm-opts:
        description: "Options JVM"
        type: string
        default: "-Xms384m -Xmx768m -XX:MaxMetaspaceSize=192m -XX:+UseG1GC -XX:+UseStringDeduplication -XX:+OptimizeStringConcat -Djava.security.egd=file:/dev/./urandom"
      memory-limit:
        description: "Limite mémoire Docker"
        type: string
        default: "1g"
      maven-goals:
        description: "Goals Maven"
        type: string
        default: "clean verify"
      sonar-enabled:
        description: "Activer l'analyse SonarQube"
        type: boolean
        default: true
      upload-folder:
        description: "Dossier upload de l'application"
        type: string
        default: "/upload"
      release:
        description: "Déclencher un release (bump version + tag + Nexus releases + Docker :version)"
        type: boolean
        default: false
      release-type:
        description: "Type de release (patch / minor / major)"
        type: string
        default: "patch"
      java-version:
        description: "Version Java (17 ou 21)"
        type: string
        default: "21"
      extra-env:
        description: |
          Variables d'environnement supplémentaires pour docker run (une par ligne, format KEY=VALUE).
          Supporte le placeholder {DEV_SUFFIX} remplacé par -dev (dev) ou vide (prod).
          Exemple:
            PREFERENCE_SERVICE_URL=http://sfd-commun{DEV_SUFFIX}:4597/api/preference
            CLIENT_SERVICE_URL=http://sfd-client{DEV_SUFFIX}:4598/api/client
        type: string
        default: ""
      extra-env-dev:
        description: |
          Variables d'environnement supplémentaires injectées uniquement en déploiement dev.
          Même format que extra-env (une par ligne, KEY=VALUE) et même support du placeholder {DEV_SUFFIX}.
        type: string
        default: ""
      volumes:
        description: |
          Volumes Docker (un par ligne, format src:dest). Remplace les volumes par défaut.
          Si vide, utilise les volumes par défaut : upload bind mount + logs bind mount.
          Supporte le placeholder {PROFILE} remplacé par "dev" ou "prod".
          Exemples (named volumes):
            {PROFILE}-commercial-uploads:/app/uploads
            {PROFILE}-commercial-logs:/app/logs
          Exemple (logs seulement):
            /opt/sfd/logs-{PROFILE}:/app/logs
        type: string
        default: ""
      docker-network:
        description: |
          Nom du réseau Docker à utiliser. Si vide, auto-détecte depuis sql-server (prod) ou sql-server-dev (dev).
          Utile pour les projets utilisant MySQL ou un autre conteneur DB.
          Supporte le placeholder {PROFILE} remplacé par "dev" ou "prod".
          Exemple: prod-network
          Exemple avec placeholder: {PROFILE}-network
        type: string
        default: ""
    secrets:
      REGISTRY_URL:
        required: true
      REGISTRY_USER:
        required: true
      REGISTRY_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      NEXUS_URL:
        required: false
      NEXUS_USER:
        required: false
      NEXUS_PASSWORD:
        required: false
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true
      GH_PAT:
        # Personal Access Token pour git push du commit de release
        # Permissions requises: contents:write
        required: false

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Build + Tests + SonarQube + Nexus SNAPSHOT
  # ─────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !inputs.release }}
    outputs:
      version: ${{ steps.version.outputs.version }}

    services:
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_VHOST: /sfd
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: "temurin"
          cache: "maven"

      - name: Configure Maven repositories
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          {
            echo '<settings>'
            echo '  <servers>'
            if [ -n "$NEXUS_URL" ]; then
              echo "    <server><id>nexus</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server>"
              echo "    <server><id>nexus-snapshots</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server>"
              echo "    <server><id>nexus-releases</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server>"
            fi
            echo '  </servers>'
            if [ -n "$NEXUS_URL" ]; then
              echo '  <profiles>'
              echo '    <profile>'
              echo '      <id>nexus-private</id>'
              echo '      <repositories>'
              echo '        <repository>'
              echo '          <id>nexus-releases</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-releases/</url>"
              echo '          <releases><enabled>true</enabled></releases>'
              echo '          <snapshots><enabled>false</enabled></snapshots>'
              echo '        </repository>'
              echo '        <repository>'
              echo '          <id>nexus-snapshots</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-snapshots/</url>"
              echo '          <releases><enabled>false</enabled></releases>'
              echo '          <snapshots><enabled>true</enabled><updatePolicy>always</updatePolicy></snapshots>'
              echo '        </repository>'
              echo '      </repositories>'
              echo '      <pluginRepositories>'
              echo '        <pluginRepository>'
              echo '          <id>nexus-releases</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-releases/</url>"
              echo '          <releases><enabled>true</enabled></releases>'
              echo '          <snapshots><enabled>false</enabled></snapshots>'
              echo '        </pluginRepository>'
              echo '        <pluginRepository>'
              echo '          <id>nexus-snapshots</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-snapshots/</url>"
              echo '          <releases><enabled>false</enabled></releases>'
              echo '          <snapshots><enabled>true</enabled><updatePolicy>always</updatePolicy></snapshots>'
              echo '        </pluginRepository>'
              echo '      </pluginRepositories>'
              echo '    </profile>'
              echo '  </profiles>'
              echo '  <activeProfiles>'
              echo '    <activeProfile>nexus-private</activeProfile>'
              echo '  </activeProfiles>'
            fi
            echo '</settings>'
          } > ~/.m2/settings.xml
          if [ -n "$NEXUS_URL" ]; then
            echo "Configured Maven Central for public artifacts and Nexus snapshots for private dependencies."
          else
            echo "NEXUS_URL is not set; resolving public artifacts via Maven Central only."
          fi

      - name: Determine version
        id: version
        run: |
          RUN_NUM=${{ github.run_number }}
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "${{ inputs.release-branch }}" ]; then
            echo "version=latest" >> $GITHUB_OUTPUT
          else
            echo "version=${RUN_NUM}-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Build & Test
        run: mvn ${{ inputs.maven-goals }} -U --no-transfer-progress

      - name: SonarQube Analysis
        if: ${{ inputs.sonar-enabled }}
        continue-on-error: true
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            -Dsonar.java.source=${{ inputs.java-version }} \
            -Dsonar.java.target=${{ inputs.java-version }} \
            "-Dsonar.exclusions=**/generated-sources/**,**/generated/**,**/target/generated-sources/**,**/*MapperImpl.java,**/*MapperImpl.class" \
            "-Dsonar.coverage.exclusions=**/*Application.java,**/*Config.java,**/*Configuration.java,**/*Dto.java,**/dto/**,**/*Entity.java,**/entity/**,**/exception/**,**/*Exception.java,**/*Mapper.java,**/mapper/**,**/enums/**,**/loader/**,**/config/**" \
            "-Dsonar.cpd.exclusions=**/*Dto.java,**/dto/**,**/*Entity.java,**/entity/**,**/enums/**"

      - name: Deploy SNAPSHOT to Nexus (même JAR — pas de double build)
        # Utilise deploy:deploy-file pour pousser le JAR déjà construit par mvn verify
        # (comme Jenkins stash/unstash — un seul build, même binaire testé va sur Nexus)
        if: ${{ github.ref_name == 'develop' || github.ref_name == inputs.release-branch }}
        continue-on-error: true
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$POM_VERSION" == *"-SNAPSHOT" ]]; then
            JAR=$(find target -maxdepth 1 -name "*.jar" ! -name "*-exec.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "*tests*" | sort | head -1)
            if [ -z "$JAR" ]; then
              JAR=$(find target -maxdepth 1 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "*tests*" | sort | head -1)
            fi
            if [ -z "$JAR" ]; then
              echo "⚠️ No JAR found in target/ — skipping Nexus deploy"
              exit 0
            fi
            GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
            ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
            echo "Deploying ${JAR} (${GROUP_ID}:${ARTIFACT_ID}:${POM_VERSION}) to Nexus snapshots..."
            mvn deploy:deploy-file \
              -Durl="${NEXUS_URL}/repository/maven-snapshots/" \
              -DrepositoryId=nexus-snapshots \
              -Dfile="${JAR}" \
              -DpomFile=pom.xml \
              -DgroupId="${GROUP_ID}" \
              -DartifactId="${ARTIFACT_ID}" \
              -Dversion="${POM_VERSION}" \
              -Dpackaging=jar \
              --no-transfer-progress \
              -q && echo "✅ ${ARTIFACT_ID}:${POM_VERSION} deployed to Nexus snapshots"
          else
            echo "Release version ${POM_VERSION} — skipping Nexus deploy (use Release workflow)"
          fi

      - name: Prepare Docker JAR artifact
        run: |
          DOCKER_JAR=$(find target -maxdepth 1 -name "*-exec.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "*tests*" | sort | head -1)
          if [ -z "$DOCKER_JAR" ]; then
            DOCKER_JAR=$(find target -maxdepth 1 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "*tests*" | sort | head -1)
          fi
          if [ -z "$DOCKER_JAR" ]; then
            echo "❌ No runnable JAR found in target/"
            exit 1
          fi
          cp "$DOCKER_JAR" target/app.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ github.run_number }}
          path: target/app.jar
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2 : Docker Build + Push
  # ─────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: ${{ !inputs.release }}
    outputs:
      container-name: ${{ steps.tag.outputs.container-name }}
      port-mapping: ${{ steps.tag.outputs.port-mapping }}
      spring-profile: ${{ steps.tag.outputs.spring-profile }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-${{ github.run_number }}
          path: target/

      - name: Set image tags
        id: tag
        run: |
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "${{ inputs.release-branch }}" ]; then
            IMAGE="${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:latest"
            CONTAINER="${{ inputs.app-name }}"
            PORT="${{ inputs.prod-port }}:${{ inputs.java-internal-port }}"
            PROFILE="prod"
          else
            IMAGE="${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}-dev:${{ needs.build.outputs.version }}"
            CONTAINER="${{ inputs.app-name }}-dev"
            PORT="${{ inputs.dev-port }}:${{ inputs.java-internal-port }}"
            PROFILE="dev"
          fi
          echo "image-tag=${IMAGE}" >> $GITHUB_OUTPUT
          echo "container-name=${CONTAINER}" >> $GITHUB_OUTPUT
          echo "port-mapping=${PORT}" >> $GITHUB_OUTPUT
          echo "spring-profile=${PROFILE}" >> $GITHUB_OUTPUT

      - name: Login to Docker Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} \
            -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ steps.tag.outputs.image-tag }} .
          docker push ${{ steps.tag.outputs.image-tag }}

  # ─────────────────────────────────────────
  # JOB 3 : Deploy via SSH + Health Check + Rollback
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, docker]
    if: ${{ !inputs.release }}

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy container via SSH
        env:
          PROFILE: ${{ needs.docker.outputs.spring-profile }}
          CONTAINER: ${{ needs.docker.outputs.container-name }}
          PORT: ${{ needs.docker.outputs.port-mapping }}
          APP_NAME: ${{ inputs.app-name }}
          JVM_OPTS: ${{ inputs.jvm-opts }}
          MEMORY_LIMIT: ${{ inputs.memory-limit }}
          UPLOAD_FOLDER: ${{ inputs.upload-folder }}
          EXTRA_ENV_TEMPLATE: ${{ inputs.extra-env }}
          EXTRA_ENV_DEV_TEMPLATE: ${{ inputs.extra-env-dev }}
          VOLUMES_TEMPLATE: ${{ inputs.volumes }}
          DOCKER_NETWORK_INPUT: ${{ inputs.docker-network }}
        run: |
          # Reconstruct full image URL (avoids GitHub secret masking in outputs)
          if [ "$PROFILE" = "prod" ]; then
            IMAGE="${{ secrets.REGISTRY_URL }}/${APP_NAME}:latest"
            DEV_SUFFIX=""
          else
            IMAGE="${{ secrets.REGISTRY_URL }}/${APP_NAME}-dev:${{ needs.build.outputs.version }}"
            DEV_SUFFIX="-dev"
          fi

          # Process extra-env: base env + optional dev-only env, replace {DEV_SUFFIX},
          # then encode as pipe-separated string for the SSH handoff.
          EXTRA_ENV_ENCODED=""
          EXTRA_ENV_CONTENT="$EXTRA_ENV_TEMPLATE"
          if [ "$PROFILE" != "prod" ] && [ -n "$EXTRA_ENV_DEV_TEMPLATE" ]; then
            if [ -n "$EXTRA_ENV_CONTENT" ]; then
              EXTRA_ENV_CONTENT="${EXTRA_ENV_CONTENT}"$'\n'"${EXTRA_ENV_DEV_TEMPLATE}"
            else
              EXTRA_ENV_CONTENT="${EXTRA_ENV_DEV_TEMPLATE}"
            fi
          fi
          if [ -n "$EXTRA_ENV_CONTENT" ]; then
            EXTRA_ENV_ENCODED=$(echo "$EXTRA_ENV_CONTENT" | sed "s/{DEV_SUFFIX}/${DEV_SUFFIX}/g" | tr '\n' '|' | sed 's/|$//')
          fi

          # Process volumes: replace {PROFILE} placeholder and encode as pipe-separated string
          VOLUMES_ENCODED=""
          if [ -n "$VOLUMES_TEMPLATE" ]; then
            VOLUMES_ENCODED=$(echo "$VOLUMES_TEMPLATE" | sed "s/{PROFILE}/${PROFILE}/g" | tr '\n' '|' | sed 's/|$//')
          fi

          # Process docker-network: replace {PROFILE} placeholder
          if [ -n "$DOCKER_NETWORK_INPUT" ]; then
            DOCKER_NETWORK_INPUT=$(echo "$DOCKER_NETWORK_INPUT" | sed "s/{PROFILE}/${PROFILE}/g")
          fi

          JVM_OPTS_Q="$(printf '%q' "$JVM_OPTS")"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            PROFILE="$PROFILE" \
            CONTAINER="$CONTAINER" \
            PORT="$PORT" \
            APP_NAME="$APP_NAME" \
            JVM_OPTS="$JVM_OPTS_Q" \
            MEMORY_LIMIT="$MEMORY_LIMIT" \
            UPLOAD_FOLDER="$UPLOAD_FOLDER" \
            IMAGE="$IMAGE" \
            EXTRA_ENV_ENCODED="$EXTRA_ENV_ENCODED" \
            VOLUMES_ENCODED="$VOLUMES_ENCODED" \
            DOCKER_NETWORK_INPUT="$DOCKER_NETWORK_INPUT" \
            bash << 'ENDSSH'
            set -e

            APP_DIR="/home/ubuntu/pierre/app/${PROFILE}/${APP_NAME}"
            LOG_DIR="/opt/sfd/logs-${PROFILE}"

            echo "🚀 Deploying ${CONTAINER} (${IMAGE})..."

            # Préparer les dossiers et construire les flags de volumes
            VOL_OPTS=""
            if [ -n "$VOLUMES_ENCODED" ]; then
              IFS='|' read -ra VOL_SPECS <<< "$VOLUMES_ENCODED"
              for vol in "${VOL_SPECS[@]}"; do
                if [[ -n "$vol" ]]; then
                  host_path="${vol%%:*}"
                  [[ "$host_path" == /* ]] && mkdir -p "$host_path"
                  VOL_OPTS="$VOL_OPTS -v $vol"
                fi
              done
            else
              mkdir -p "${APP_DIR}/upload" "${LOG_DIR}"
              VOL_OPTS="-v ${APP_DIR}/upload:${UPLOAD_FOLDER} -v ${LOG_DIR}:/app/logs"
            fi

            # Pull la nouvelle image
            docker pull "${IMAGE}"

            # Sauvegarder l'ancienne image AVANT arrêt (comme Jenkins: DockerUtils.currentImage)
            OLD_IMAGE=$(docker inspect "${CONTAINER}" --format='{{.Config.Image}}' 2>/dev/null || echo "")

            # Choisir le réseau Docker
            if [ -n "$DOCKER_NETWORK_INPUT" ]; then
              # Explicit network from input
              DOCKER_NETWORK="$DOCKER_NETWORK_INPUT"
              docker network create "${DOCKER_NETWORK}" 2>/dev/null || true
            elif [ "$PROFILE" = "prod" ]; then
              DOCKER_NETWORK=$(docker inspect sql-server \
                --format='{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
                2>/dev/null | awk '{print $1}')
            else
              DOCKER_NETWORK=$(docker inspect sql-server-dev \
                --format='{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
                2>/dev/null | awk '{print $1}')
            fi
            [ -z "$DOCKER_NETWORK" ] && DOCKER_NETWORK="bridge"
            echo "Using Docker network: ${DOCKER_NETWORK}"

            # Sauvegarder TOUS les paramètres nécessaires au rollback
            # (Jenkins rerun avec exactement la même config: env, ports, volumes, network, extraArgs)
            {
              echo "OLD_IMAGE=${OLD_IMAGE}"
              echo "PROFILE=${PROFILE}"
              echo "PORT=${PORT}"
              echo "APP_NAME=${APP_NAME}"
              echo "JVM_OPTS=${JVM_OPTS}"
              echo "MEMORY_LIMIT=${MEMORY_LIMIT}"
              echo "UPLOAD_FOLDER=${UPLOAD_FOLDER}"
              echo "APP_DIR=${APP_DIR}"
              echo "LOG_DIR=${LOG_DIR}"
              echo "DOCKER_NETWORK=${DOCKER_NETWORK}"
              echo "EXTRA_ENV_ENCODED=${EXTRA_ENV_ENCODED}"
              echo "VOLUMES_ENCODED=${VOLUMES_ENCODED}"
            } > /tmp/rollback_${CONTAINER}.env

            # Construire le fichier d'env supplémentaire (inter-service URLs, etc.)
            EXTRA_ENV_FILE="/tmp/sfd_extra_env_${CONTAINER}.env"
            : > "$EXTRA_ENV_FILE"
            if [ -n "$EXTRA_ENV_ENCODED" ]; then
              IFS='|' read -ra ENV_PAIRS <<< "$EXTRA_ENV_ENCODED"
              for pair in "${ENV_PAIRS[@]}"; do
                [[ -n "$pair" ]] && echo "$pair" >> "$EXTRA_ENV_FILE"
              done
              echo "📋 Extra env vars: $(wc -l < "$EXTRA_ENV_FILE") variables"
              grep -E '^(DATABASE_POOL_|APP_RABBITMQ_LISTENERS_AUTO_STARTUP|PREFERENCE_SERVICE_URL|CLIENT_SERVICE_URL|COMPTABILITE_SERVICE_URL)=' \
                "$EXTRA_ENV_FILE" || true
            fi
            ENV_FILE_OPT=""
            [ -s "$EXTRA_ENV_FILE" ] && ENV_FILE_OPT="--env-file $EXTRA_ENV_FILE"

            # Arrêter et supprimer l'ancien container
            docker stop "${CONTAINER}" 2>/dev/null || true
            docker rm "${CONTAINER}" 2>/dev/null || true

            # Démarrer le nouveau container
            docker run -d \
              --name "${CONTAINER}" \
              --restart=always \
              --memory="${MEMORY_LIMIT}" \
              --memory-swap="${MEMORY_LIMIT}" \
              --cpus=2 \
              --network="${DOCKER_NETWORK}" \
              -p "${PORT}" \
              -e SPRING_PROFILES_ACTIVE="${PROFILE}" \
              -e UPLOAD_FOLDER="${UPLOAD_FOLDER}" \
              -e JAVA_OPTS="${JVM_OPTS}" \
              $ENV_FILE_OPT \
              $VOL_OPTS \
              "${IMAGE}"

            echo "✅ Container ${CONTAINER} started on network ${DOCKER_NETWORK}"
          ENDSSH

      - name: Health check
        # Exécuté via SSH (curl localhost depuis le VPS) car le runner GitHub Actions
        # est une IP externe — les ports internes du VPS ne sont pas exposés publiquement.
        run: |
          PORT=$(echo "${{ needs.docker.outputs.port-mapping }}" | cut -d: -f1)
          CONTAINER="${{ needs.docker.outputs.container-name }}"
          HEALTH_PATH="${{ inputs.health-path }}"
          echo "Checking http://localhost:${PORT}${HEALTH_PATH} on VPS (via SSH)..."

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            PORT="${PORT}" CONTAINER="${CONTAINER}" HEALTH_PATH="${HEALTH_PATH}" \
            bash << 'HEALTHCHECK'
            # Attente initiale démarrage Spring Boot
            sleep 60

            echo "Container env snapshot:"
            docker inspect "${CONTAINER}" --format='{{range .Config.Env}}{{println .}}{{end}}' \
              | grep -E '^(SPRING_PROFILES_ACTIVE|DATABASE_POOL_|APP_RABBITMQ_LISTENERS_AUTO_STARTUP|PREFERENCE_SERVICE_URL|CLIENT_SERVICE_URL|COMPTABILITE_SERVICE_URL)=' \
              || true

            for i in $(seq 1 30); do
              RUNNING=$(docker inspect --format='{{.State.Running}}' "${CONTAINER}" 2>/dev/null || echo "false")
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                "http://localhost:${PORT}${HEALTH_PATH}" 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "✅ Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/30 — HTTP ${STATUS}, container running: ${RUNNING}"
              if [ "${RUNNING}" != "true" ] || [ "$STATUS" = "000" ]; then
                echo "Container logs (last 80 lines):"
                docker logs --tail 80 "${CONTAINER}" 2>&1 | grep -v "^[0-9].*|-INFO\|^[0-9].*|-WARN" || true
              fi
              sleep 10
            done

            echo "❌ Health check failed — rolling back (like Jenkins rollbackOnFailure)"
            # Rollback identique à Jenkins: DockerUtils.stopAndRemove + DockerUtils.runContainer(previousImage, pull:false)
            # Tous les paramètres (env, volumes, network, memory) sont restaurés depuis le fichier de sauvegarde
            set -a; source /tmp/rollback_${CONTAINER}.env 2>/dev/null; set +a
            if [ -z "$OLD_IMAGE" ]; then
              echo "No previous image — cannot roll back"
              exit 1
            fi
            echo "↩️ Rolling back to ${OLD_IMAGE}"
            docker stop "${CONTAINER}" 2>/dev/null || true
            docker rm "${CONTAINER}" 2>/dev/null || true
            # Relancer avec exactement la même config (pull:false comme Jenkins)
            ROLLBACK_VOL_OPTS=""
            if [ -n "$VOLUMES_ENCODED" ]; then
              IFS='|' read -ra VOL_SPECS <<< "$VOLUMES_ENCODED"
              for vol in "${VOL_SPECS[@]}"; do
                if [[ -n "$vol" ]]; then
                  host_path="${vol%%:*}"
                  [[ "$host_path" == /* ]] && mkdir -p "$host_path"
                  ROLLBACK_VOL_OPTS="$ROLLBACK_VOL_OPTS -v $vol"
                fi
              done
            else
              ROLLBACK_VOL_OPTS="-v ${APP_DIR}/upload:${UPLOAD_FOLDER} -v ${LOG_DIR}:/app/logs"
            fi
            docker run -d \
              --name "${CONTAINER}" \
              --restart=always \
              --memory="${MEMORY_LIMIT}" \
              --memory-swap="${MEMORY_LIMIT}" \
              --cpus=2 \
              --network="${DOCKER_NETWORK}" \
              -p "${PORT}" \
              -e SPRING_PROFILES_ACTIVE="${PROFILE}" \
              -e UPLOAD_FOLDER="${UPLOAD_FOLDER}" \
              -e JAVA_OPTS="${JVM_OPTS}" \
              $ROLLBACK_VOL_OPTS \
              "${OLD_IMAGE}" \
              && echo "✅ Rollback to ${OLD_IMAGE} successful" \
              || echo "❌ Rollback failed"
            exit 1
          HEALTHCHECK

  # ─────────────────────────────────────────
  # JOB 4 : Release (version bump + Nexus releases + Docker :version)
  # Déclenché uniquement si inputs.release = true
  # Équivalent Jenkins: params.Release=true → ReleaseUtils.performRelease
  # ─────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ inputs.release }}

    services:
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_VHOST: /sfd
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GH_PAT permet le push du commit de release (token Actions ne peut pas push sur branch protégée)
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: "temurin"
          cache: "maven"

      - name: Configure Maven repositories
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          {
            echo '<settings>'
            echo '  <servers>'
            if [ -n "$NEXUS_URL" ]; then
              echo "    <server><id>nexus</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server>"
              echo "    <server><id>nexus-snapshots</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server>"
              echo "    <server><id>nexus-releases</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server>"
            fi
            echo '  </servers>'
            if [ -n "$NEXUS_URL" ]; then
              echo '  <profiles>'
              echo '    <profile>'
              echo '      <id>nexus-private</id>'
              echo '      <repositories>'
              echo '        <repository>'
              echo '          <id>nexus-releases</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-releases/</url>"
              echo '          <releases><enabled>true</enabled></releases>'
              echo '          <snapshots><enabled>false</enabled></snapshots>'
              echo '        </repository>'
              echo '        <repository>'
              echo '          <id>nexus-snapshots</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-snapshots/</url>"
              echo '          <releases><enabled>false</enabled></releases>'
              echo '          <snapshots><enabled>true</enabled><updatePolicy>always</updatePolicy></snapshots>'
              echo '        </repository>'
              echo '      </repositories>'
              echo '      <pluginRepositories>'
              echo '        <pluginRepository>'
              echo '          <id>nexus-releases</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-releases/</url>"
              echo '          <releases><enabled>true</enabled></releases>'
              echo '          <snapshots><enabled>false</enabled></snapshots>'
              echo '        </pluginRepository>'
              echo '        <pluginRepository>'
              echo '          <id>nexus-snapshots</id>'
              echo "          <url>${NEXUS_URL}/repository/maven-snapshots/</url>"
              echo '          <releases><enabled>false</enabled></releases>'
              echo '          <snapshots><enabled>true</enabled><updatePolicy>always</updatePolicy></snapshots>'
              echo '        </pluginRepository>'
              echo '      </pluginRepositories>'
              echo '    </profile>'
              echo '  </profiles>'
              echo '  <activeProfiles>'
              echo '    <activeProfile>nexus-private</activeProfile>'
              echo '  </activeProfiles>'
            fi
            echo '</settings>'
          } > ~/.m2/settings.xml
          if [ -n "$NEXUS_URL" ]; then
            echo "Configured Maven Central for public artifacts and Nexus snapshots for private dependencies."
          else
            echo "NEXUS_URL is not set; resolving public artifacts via Maven Central only."
          fi

      - name: Compute release version
        id: release-version
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # Enlever le suffixe -SNAPSHOT si présent
          BASE=${CURRENT%-SNAPSHOT}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "${{ inputs.release-type }}" in
            major) NEW_VERSION="$((MAJOR+1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            *)     NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac
          # Prochaine version SNAPSHOT pour préparer le cycle suivant
          NEXT_SNAPSHOT="${MAJOR}.${MINOR}.$((PATCH+2))-SNAPSHOT"
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "next-snapshot=${NEXT_SNAPSHOT}" >> $GITHUB_OUTPUT
          echo "📦 Release: ${CURRENT} → ${NEW_VERSION} (next: ${NEXT_SNAPSHOT})"

      - name: Set release version in pom.xml
        run: |
          mvn versions:set -DnewVersion=${{ steps.release-version.outputs.version }} \
            -DgenerateBackupPoms=false -q

      - name: Build & Test release version
        run: mvn ${{ inputs.maven-goals }} -U --no-transfer-progress

      - name: SonarQube Analysis (release)
        if: ${{ inputs.sonar-enabled }}
        continue-on-error: true
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            -Dsonar.java.source=${{ inputs.java-version }} \
            -Dsonar.java.target=${{ inputs.java-version }} \
            "-Dsonar.exclusions=**/generated-sources/**,**/generated/**,**/target/generated-sources/**,**/*MapperImpl.java,**/*MapperImpl.class" \
            "-Dsonar.coverage.exclusions=**/*Application.java,**/*Config.java,**/*Configuration.java,**/*Dto.java,**/dto/**,**/*Entity.java,**/entity/**,**/exception/**,**/*Exception.java,**/*Mapper.java,**/mapper/**,**/enums/**,**/loader/**,**/config/**" \
            "-Dsonar.cpd.exclusions=**/*Dto.java,**/dto/**,**/*Entity.java,**/entity/**,**/enums/**"

      - name: Deploy to Nexus releases (même JAR — pas de double build)
        # deploy:deploy-file pousse le JAR déjà testé, sans recompilation
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
        run: |
          VERSION="${{ steps.release-version.outputs.version }}"
          JAR=$(find target -maxdepth 1 -name "*.jar" ! -name "*-exec.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "*tests*" | sort | head -1)
          if [ -z "$JAR" ]; then
            JAR=$(find target -maxdepth 1 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "*tests*" | sort | head -1)
          fi
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          echo "Deploying ${JAR} → Nexus releases (${GROUP_ID}:${ARTIFACT_ID}:${VERSION})..."
          mvn deploy:deploy-file \
            -Durl="${NEXUS_URL}/repository/maven-releases/" \
            -DrepositoryId=nexus-releases \
            -Dfile="${JAR}" \
            -DpomFile=pom.xml \
            -DgroupId="${GROUP_ID}" \
            -DartifactId="${ARTIFACT_ID}" \
            -Dversion="${VERSION}" \
            -Dpackaging=jar \
            --no-transfer-progress \
            -q && echo "✅ ${ARTIFACT_ID}:${VERSION} deployed to Nexus releases"

      - name: Build & Push Docker image (version tag + latest)
        run: |
          VERSION="${{ steps.release-version.outputs.version }}"
          IMAGE_VERSIONED="${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:${VERSION}"
          IMAGE_LATEST="${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:latest"

          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} \
            -u ${{ secrets.REGISTRY_USER }} --password-stdin

          DOCKER_JAR=$(find target -maxdepth 1 -name "*-exec.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "*tests*" | sort | head -1)
          if [ -z "$DOCKER_JAR" ]; then
            DOCKER_JAR=$(find target -maxdepth 1 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "*tests*" | sort | head -1)
          fi
          if [ -z "$DOCKER_JAR" ]; then
            echo "❌ No runnable JAR found in target/"
            exit 1
          fi
          cp "$DOCKER_JAR" target/app.jar
          find target -maxdepth 1 -name "*.jar" ! -name "app.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "*tests*" -delete

          docker build -t "${IMAGE_VERSIONED}" -t "${IMAGE_LATEST}" .
          docker push "${IMAGE_VERSIONED}"
          docker push "${IMAGE_LATEST}"
          echo "✅ Pushed ${IMAGE_VERSIONED} + ${IMAGE_LATEST}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit release version + tag
        run: |
          VERSION="${{ steps.release-version.outputs.version }}"
          git add pom.xml
          git commit -m "release: bump version to ${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release ${VERSION}"

      - name: Bump to next SNAPSHOT + commit
        run: |
          NEXT="${{ steps.release-version.outputs.next-snapshot }}"
          mvn versions:set -DnewVersion="${NEXT}" -DgenerateBackupPoms=false -q
          git add pom.xml
          git commit -m "chore: prepare next development version ${NEXT} [skip ci]"

      - name: Push commits + tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.release-version.outputs.version }}"
          echo "✅ Pushed release commit + tag v${{ steps.release-version.outputs.version }}"

      - name: Deploy release to VPS (prod)
        run: |
          VERSION="${{ steps.release-version.outputs.version }}"
          IMAGE="${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:${VERSION}"
          CONTAINER="${{ inputs.app-name }}"
          PORT="${{ inputs.prod-port }}:${{ inputs.java-internal-port }}"
          APP_NAME="${{ inputs.app-name }}"
          JVM_OPTS="${{ inputs.jvm-opts }}"
          MEMORY_LIMIT="${{ inputs.memory-limit }}"
          UPLOAD_FOLDER="${{ inputs.upload-folder }}"

          # Process extra-env for prod (DEV_SUFFIX = empty)
          EXTRA_ENV_ENCODED=""
          EXTRA_ENV_TEMPLATE="${{ inputs.extra-env }}"
          if [ -n "$EXTRA_ENV_TEMPLATE" ]; then
            EXTRA_ENV_ENCODED=$(echo "$EXTRA_ENV_TEMPLATE" | sed "s/{DEV_SUFFIX}//g" | tr '\n' '|' | sed 's/|$//')
          fi

          # Process volumes for prod (PROFILE = prod)
          VOLUMES_ENCODED=""
          VOLUMES_TEMPLATE="${{ inputs.volumes }}"
          if [ -n "$VOLUMES_TEMPLATE" ]; then
            VOLUMES_ENCODED=$(echo "$VOLUMES_TEMPLATE" | sed "s/{PROFILE}/prod/g" | tr '\n' '|' | sed 's/|$//')
          fi

          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          JVM_OPTS_Q="$(printf '%q' "$JVM_OPTS")"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            CONTAINER="$CONTAINER" \
            PORT="$PORT" \
            APP_NAME="$APP_NAME" \
            JVM_OPTS="$JVM_OPTS_Q" \
            MEMORY_LIMIT="$MEMORY_LIMIT" \
            UPLOAD_FOLDER="$UPLOAD_FOLDER" \
            IMAGE="$IMAGE" \
            EXTRA_ENV_ENCODED="$EXTRA_ENV_ENCODED" \
            VOLUMES_ENCODED="$VOLUMES_ENCODED" \
            DOCKER_NETWORK_INPUT="$(echo '${{ inputs.docker-network }}' | sed 's/{PROFILE}/prod/g')" \
            bash << 'ENDSSH'
            set -e

            APP_DIR="/home/ubuntu/pierre/app/prod/${APP_NAME}"
            LOG_DIR="/opt/sfd/logs-prod"

            echo "🚀 Releasing ${CONTAINER} (${IMAGE})..."
            docker pull "${IMAGE}"

            OLD_IMAGE=$(docker inspect "${CONTAINER}" --format='{{.Config.Image}}' 2>/dev/null || echo "")

            if [ -n "$DOCKER_NETWORK_INPUT" ]; then
              DOCKER_NETWORK="$DOCKER_NETWORK_INPUT"
              docker network create "${DOCKER_NETWORK}" 2>/dev/null || true
            else
              DOCKER_NETWORK=$(docker inspect sql-server \
                --format='{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
                2>/dev/null | awk '{print $1}')
            fi
            [ -z "$DOCKER_NETWORK" ] && DOCKER_NETWORK="bridge"

            # Construire le fichier d'env supplémentaire
            EXTRA_ENV_FILE="/tmp/sfd_extra_env_${CONTAINER}.env"
            : > "$EXTRA_ENV_FILE"
            if [ -n "$EXTRA_ENV_ENCODED" ]; then
              IFS='|' read -ra ENV_PAIRS <<< "$EXTRA_ENV_ENCODED"
              for pair in "${ENV_PAIRS[@]}"; do
                [[ -n "$pair" ]] && echo "$pair" >> "$EXTRA_ENV_FILE"
              done
            fi
            ENV_FILE_OPT=""
            [ -s "$EXTRA_ENV_FILE" ] && ENV_FILE_OPT="--env-file $EXTRA_ENV_FILE"

            {
              echo "OLD_IMAGE=${OLD_IMAGE}"
              echo "PROFILE=prod"
              echo "PORT=${PORT}"
              echo "APP_NAME=${APP_NAME}"
              echo "JVM_OPTS=${JVM_OPTS}"
              echo "MEMORY_LIMIT=${MEMORY_LIMIT}"
              echo "UPLOAD_FOLDER=${UPLOAD_FOLDER}"
              echo "APP_DIR=${APP_DIR}"
              echo "LOG_DIR=${LOG_DIR}"
              echo "DOCKER_NETWORK=${DOCKER_NETWORK}"
              echo "EXTRA_ENV_ENCODED=${EXTRA_ENV_ENCODED}"
              echo "VOLUMES_ENCODED=${VOLUMES_ENCODED}"
            } > /tmp/rollback_${CONTAINER}.env

            # Construire les flags de volumes pour le release
            VOL_OPTS=""
            if [ -n "$VOLUMES_ENCODED" ]; then
              IFS='|' read -ra VOL_SPECS <<< "$VOLUMES_ENCODED"
              for vol in "${VOL_SPECS[@]}"; do
                if [[ -n "$vol" ]]; then
                  host_path="${vol%%:*}"
                  [[ "$host_path" == /* ]] && mkdir -p "$host_path"
                  VOL_OPTS="$VOL_OPTS -v $vol"
                fi
              done
            else
              VOL_OPTS="-v ${APP_DIR}/upload:${UPLOAD_FOLDER} -v ${LOG_DIR}:/app/logs"
            fi

            docker stop "${CONTAINER}" 2>/dev/null || true
            docker rm "${CONTAINER}" 2>/dev/null || true

            docker run -d \
              --name "${CONTAINER}" \
              --restart=always \
              --memory="${MEMORY_LIMIT}" \
              --memory-swap="${MEMORY_LIMIT}" \
              --cpus=2 \
              --network="${DOCKER_NETWORK}" \
              -p "${PORT}" \
              -e SPRING_PROFILES_ACTIVE="prod" \
              -e UPLOAD_FOLDER="${UPLOAD_FOLDER}" \
              -e JAVA_OPTS="${JVM_OPTS}" \
              $ENV_FILE_OPT \
              $VOL_OPTS \
              "${IMAGE}"

            echo "✅ Release container ${CONTAINER} started"
          ENDSSH

      - name: Health check (release)
        run: |
          PORT=${{ inputs.prod-port }}
          CONTAINER="${{ inputs.app-name }}"
          HEALTH_PATH="${{ inputs.health-path }}"
          echo "Checking http://localhost:${PORT}${HEALTH_PATH} on VPS (via SSH)..."

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            PORT="${PORT}" CONTAINER="${CONTAINER}" HEALTH_PATH="${HEALTH_PATH}" \
            bash << 'HEALTHCHECK'
            sleep 60
            echo "Container env snapshot:"
            docker inspect "${CONTAINER}" --format='{{range .Config.Env}}{{println .}}{{end}}' \
              | grep -E '^(SPRING_PROFILES_ACTIVE|DATABASE_POOL_|APP_RABBITMQ_LISTENERS_AUTO_STARTUP|PREFERENCE_SERVICE_URL|CLIENT_SERVICE_URL|COMPTABILITE_SERVICE_URL)=' \
              || true
            for i in $(seq 1 30); do
              RUNNING=$(docker inspect --format='{{.State.Running}}' "${CONTAINER}" 2>/dev/null || echo "false")
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                "http://localhost:${PORT}${HEALTH_PATH}" 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "✅ Release health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/30 — HTTP ${STATUS}, container running: ${RUNNING}"
              if [ "${RUNNING}" != "true" ] || [ "$STATUS" = "000" ]; then
                echo "Container logs (last 80 lines):"
                docker logs --tail 80 "${CONTAINER}" 2>&1 | grep -v "^[0-9].*|-INFO\|^[0-9].*|-WARN" || true
              fi
              sleep 10
            done
            echo "❌ Release health check failed"
            exit 1
          HEALTHCHECK
