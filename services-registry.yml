_meta:
  schema-version: 1
  last-updated: 2026-03-22
  description: >
    Registre centralisé des services SFD ERP-UEMOA.
    Modifier CE FICHIER pour ajouter/modifier un service.
    Le dispatcher.yml lit ce fichier via github.repository.

# services-registry.yml
# Clé = github.repository (org/repo) — source de vérité unique pour tous les services SFD
# Modifier ICI quand un port ou une config change. Jamais dans les repos de service.

# ── Field contract per template ─────────────────────────────────────────
# java          : template, app-name, dev-port, prod-port, internal-port,
#                 health-path, release-branch
# angular       : template, app-name, dev-port, prod-port, release-branch,
#                 e2e-enabled, e2e-command (opt), json-server-port (opt)
# maven-library : template, app-name, sonar-enabled, nexus-deploy
#                 (no port, no release-branch)

# ── internal-port note ───────────────────────────────────────────────────
# internal-port = the port the JVM listens on inside the Docker container.
# In this project dev-port == internal-port (no JVM remapping).
# The distinction matters for Docker: -p dev-port:internal-port (dev)
#                                 vs  -p prod-port:internal-port (prod).

